{% load static %}
      <div id="hero-area" class="hero-area-bg">
        <div class="container">
          <div class="row">
            <div class="col-lg-7 col-md-12 col-sm-12 col-xs-12">
              <div class="contents">
                <h2 class="head-title">Desenvolvemos Apps para<br>Mobile, Web & SaaS</h2>
                <p>Venha desenvolver a sua ideia conosco e crie soluções eficazes para o seu negócio. Quer saber mais? Contate-nos agora!</p>
                <div class="header-button">
                  <a href="#" class="btn btn-common">Contato</a>
                  <a href="#" class="btn btn-border video-popup">Saber Mais</a>
                </div>
              </div>
            </div>
            <div class="col-lg-5 col-md-12 col-sm-12 col-xs-12">
              <div class="intro-img">
                <img class="img-fluid" src="{% static 'img/intro-mobile.png' %}" alt="">
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Cria uma container em formato de spam ao submeter um formulário -->
      <div class="container">
          {% if messages %}
              {% for m in messages %}
                <!-- Exibe uma mensagem de alerta do formulário de contato -->
                <div class="alert alert-{{ m.tags }}">
                    <button type="button" class="close" data-dismiss="alert"></button>
                    <strong>{{ m }}</strong>
                </div>
              {% endfor %}
          {% endif %}
      </div>
    </header>
    <!-- Header Area wrapper End -->
